<section class="login">
  <div class="visual">
    <div class="visual-overlay"></div>
    <div class="visual-text">
      <h1>Arroyo Seco</h1>
      <p>"El tesoro escondido de Querétaro"</p>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-panel__content">
      <div class="form-card">
        <div class="logo">
          <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" />
        </div>

        <h2>Inicio de Sesión</h2>
        <p class="subtitle">Portal de Oferentes</p>

        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
          <label>
            Correo Electrónico
            <input
              type="email"
              name="email"
              placeholder="Ejemplo: correo@gmail.com"
              [(ngModel)]="loginModel.email"
              required
            />
          </label>

          <label>
            Contraseña
            <div class="password-field">
              <input
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                placeholder="Contraseña"
                [(ngModel)]="loginModel.password"
                required
              />
              <button type="button" class="toggle-pass" (click)="showPassword = !showPassword" tabindex="-1" aria-label="Mostrar u ocultar contraseña">
                <svg *ngIf="!showPassword" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg *ngIf="showPassword" viewBox="0 0 24 24"><path d="M2 4.27 3.28 3 21 20.72 19.73 22l-3.13-3.13A11.86 11.86 0 0 1 12 19.5C7 19.5 2.73 16.39 1 12a11.8 11.8 0 0 1 4.22-5.14L2 4.27zm10.84 10.84-3.96-3.96A2.99 2.99 0 0 0 12 15c.4 0 .77-.08 1.12-.23zM12 7c2.76 0 5 2.24 5 5 0 .62-.11 1.22-.33 1.76l3.01 3.01A11.8 11.8 0 0 0 23 12c-1.73-4.39-6-7.5-11-7.5-1.8 0-3.5.41-5.03 1.14l2.22 2.22A4.95 4.95 0 0 1 12 7z"/></svg>
              </button>
            </div>
          </label>

          <button type="submit" [disabled]="loginForm.invalid">
            Iniciar sesión
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 17l5-5-5-5v10zm9-14H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z" />
            </svg>
          </button>
        </form>

        <div class="links">
          <a href="#">¿Olvidaste tu contraseña?</a>
          <a routerLink="/login">Cambiar de rol</a>
          <a routerLink="/oferente/solicitud">¿No estás registrado? Envía tu solicitud</a>
        </div>
      </div>
    </div>
  </div>
</section>
